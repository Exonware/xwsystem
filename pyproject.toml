  [project.urls]
    Homepage = "https://exonware.com"
    Repository = "https://github.com/exonware/xwsystem"
    Documentation = "https://github.com/exonware/xwsystem#readme"

[tool]
  # Dependency sizes: run 'commands measure_dependency_sizes xwsystem' to refresh # project-src-size and # file-size in this file.

  [tool.black]
    line-length = 88
    target-version = ["py38"]

  [tool.isort]
    profile = "black"
    line_length = 88

  [tool.mypy]
    python_version = "0.9.0.3"
    strict = true
    warn_return_any = true
    warn_unused_configs = true
    disallow_untyped_defs = true
    disallow_any_generics = true
    disallow_untyped_calls = true
    disallow_incomplete_defs = true
    check_untyped_defs = true
    disallow_untyped_decorators = true
    no_implicit_optional = true
    warn_redundant_casts = true
    warn_unused_ignores = true
    warn_no_return = true
    warn_unreachable = true

  [tool.hatch]

    [tool.hatch.version]
      path = "src/exonware/xwsystem/version.py"

    [tool.hatch.build]

      [tool.hatch.build.targets]

        [tool.hatch.build.targets.wheel]
          packages = ["src/exonware"]
          py-modules = ["src/xwsystem"]
          include = []

        [tool.hatch.build.targets.sdist]
          include = ["/src", "/tests", "/README.md", "/.github"]
