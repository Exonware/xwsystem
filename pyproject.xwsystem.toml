# Source size (src/*): ~2.65 MB
[build-system]
requires = [
    "hatchling",
]
build-backend = "hatchling.build"

[project]
name = "xwsystem"
dynamic = [
    "version",
]
description = "Convenience wrapper for exonware-xwsystem - provides 'import xwsystem' alias"
readme = "README.md"
requires-python = ">=3.12"
keywords = [
    "enterprise",
    "framework",
    "serialization",
    "security",
    "performance",
    "monitoring",
    "threading",
    "memory-management",
    "circuit-breaker",
    "object-pool",
    "crypto",
    "ai-optimization",
    "json",
    "yaml",
    "msgpack",
    "bson",
    "cbor",
    "exonware",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Information Technology",
    "Intended Audience :: System Administrators",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: System :: Systems Administration",
    "Topic :: Security :: Cryptography",
    "Topic :: Internet :: WWW/HTTP",
    "Topic :: Database",
    "Topic :: System :: Monitoring",
]
dependencies = [
    "exonware-xwsystem",
]
"typing-extensions>" = "4.0.0\",  # file-size=341927 ; 0.33 MB"
authors = []
"{ name" = "eXonware Backend Team"

[project.license]
text = "MIT"

[project.optional-dependencies]
lazy = [
    "exonware-xwsystem[lazy]",
]
exonware-xwlazy = [
    "exonware-xwsystem[exonware-xwlazy]",
]
